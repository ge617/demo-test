<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班车小程序模型--征求意见版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
    }

    .navbar {
      display: flex;
      align-items: center;
      height: 44px;
      background-color: #009459;
      padding: 0 16px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .back-btn {
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .back-icon {
      width: 24px;
      height: 24px;
      color: #ffffff;
      cursor: pointer;
    }

    .navbar-title {
      flex: 1;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #ffffff;
      margin-right: 40px;
    }

    .search-section {
      position: fixed;
      top: 44px;
      left: 0;
      right: 0;
      background-color: #009459;
      padding: 12px 16px;
      z-index: 100;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      display: flex;
      align-items: center;
      height: 40px;
      background-color: #fff;
      border-radius: 20px;
      padding: 0 16px;
    }

    .search-icon {
      width: 18px;
      height: 18px;
      color: #999;
      margin-right: 8px;
    }

    .search-input-field {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 17px;
      color: #333;
      outline: none;
    }

    .search-input-field::placeholder {
      color: #999;
    }

    .search-btn {
      flex-shrink: 0;
      height: 40px;
      padding: 0 20px;
      background-color: #fff;
      border: none;
      border-radius: 20px;
      color: #009459;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .content {
      padding-top: 116px;
      min-height: 100vh;
    }

    .section {
      padding: 12px 16px;
    }

    .section-title {
      font-size: 15px;
      color: #5f5f5f;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .hot-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hot-item {
      padding: 8px 16px;
      background-color: #fff;
      border-radius: 18px;
      font-size: 14px;
      color: #333;
    }

    .history-list {
      background-color: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    .history-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-item .item-icon {
      width: 36px;
      height: 36px;
      background-color: #009459;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .history-item .item-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .history-item .item-icon.station-icon {
      background-color: #fff;
      border: 2px solid #009459;
    }

    .history-item .item-icon.station-icon svg {
      fill: #009459;
    }

    .history-item .item-info {
      flex: 1;
    }

    .history-item .item-name {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .history-item .item-direction {
      font-size: 14px;
      color: #666;
      margin-top: 2px;
    }

    .search-results {
      display: none;
    }

    .search-results.show {
      display: block;
    }

    .result-card {
      background-color: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .result-header {
      display: flex;
      align-items: center;
    }

    .result-icon {
      width: 36px;
      height: 36px;
      background-color: #009459;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .result-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .result-icon.station-icon {
      background-color: #fff;
      border: 2px solid #009459;
    }

    .result-icon.station-icon svg {
      fill: #009459;
    }

    .result-info {
      flex: 1;
    }

    .result-name {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .result-direction {
      font-size: 14px;
      color: #666;
      margin-top: 2px;
    }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 14px;
    }

    .station-icon circle {
      fill: #fff;
    }

    .clear-btn {
      width: 18px;
      height: 18px;
      color: #999;
      cursor: pointer;
      margin-left: 8px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <!-- 顶部导航栏 -->
  <div class="navbar">
    <div class="back-btn">
      <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </div>
    <span class="navbar-title">搜索</span>
  </div>

  <!-- 搜索栏 -->
  <div class="search-section">
    <div class="search-bar">
      <div class="search-input">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" class="search-input-field" placeholder="查线路、站点">
        <svg class="clear-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </div>
    </div>
  </div>

  <!-- 页面内容 -->
  <div class="content">
    <!-- 搜索结果 -->
    <div class="search-results" id="searchResults">
      <div class="section" id="resultsList"></div>
    </div>

    <!-- 搜索历史 -->
    <div class="history-content" id="historyContent">
      <!-- 搜索历史 -->
      <div class="section">
        <div class="section-title" style="font-size: 16px; font-weight: bold; color: #333;">历史搜索</div>
        <div class="section-title" style="margin-top: -4px; margin-bottom: 8px;">路线</div>
        <div class="history-list">
          <div class="history-item" onclick="location.href='line.html?lineName=' + encodeURIComponent('66号线')">
            <div class="item-icon">
              <svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="5919">
                <path
                  d="M835.5 165.9c-5.9-13.3-13.9-24.9-23.9-35-10-10-21.7-18-34.9-23.9-13.3-5.9-27.6-8.8-42.9-8.8H291.6c-15.3 0-29.6 3-42.9 8.8-13.3 5.9-24.9 13.9-34.9 23.9-10 10-18 21.7-23.9 35-5.9 13.3-8.8 27.6-8.8 42.9V707c0 15.3 0.1 29.6 0.4 42.9 0.3 13.3 1.9 24.9 4.9 34.9 2.9 10 8.3 18 15.9 23.9 7.7 5.9 18.9 8.8 33.6 8.8v54.9c0 15.3 5.5 28.5 16.4 39.4 10.9 10.9 24 16.4 39.4 16.4 15.3 0 28.3-5.5 38.9-16.4 10.6-10.9 15.9-24 15.9-39.4v-54.9H679v54.9c0 15.3 5.3 28.5 15.9 39.4 10.6 10.9 23.6 16.4 38.9 16.4 15.3 0 28.5-5.5 39.4-16.4 10.9-10.9 16.4-24 16.4-39.4v-54.9c15.3 0 26.8-2.9 34.5-8.8 7.7-5.9 13-13.9 15.9-23.9 2.9-10 4.4-21.8 4.4-35.4V208.8c0-15.3-3-29.6-8.9-42.9zM380.9 161c5.3-5.3 11.8-8 19.5-8H625c7.7 0 14.2 2.6 19.5 8 5.3 5.3 8 11.8 8 19.5 0 8.3-2.6 15-8 20.4-5.3 5.3-11.8 8-19.5 8H400.4c-7.7 0-14.2-2.7-19.5-8-5.3-5.3-8-12.1-8-20.4 0.1-7.7 2.7-14.1 8-19.5z m-34.9 542.9c-8 8-17.5 11.9-28.7 11.9-11.8 0-21.5-4-29.2-11.9-7.7-8-11.5-17.6-11.5-28.8s3.8-20.8 11.5-28.8 17.4-11.9 29.2-11.9c11.2 0 20.8 4 28.7 11.9 8 8 11.9 17.5 11.9 28.8s-4 20.8-11.9 28.8z m385.6-1.3c-7.4 7.7-16.4 11.5-27 11.5-11.2 0-20.5-3.8-27.9-11.5-7.4-7.7-11.1-16.8-11.1-27.4 0-10.6 3.7-19.8 11.1-27.4 7.4-7.7 16.7-11.5 27.9-11.5 10.6 0 19.6 3.8 27 11.5 7.4 7.7 11.1 16.8 11.1 27.4 0 10.6-3.7 19.7-11.1 27.4z m57.9-217.7H235.9V263.7h553.7v221.2z"
                  p-id="5920" />
              </svg>
            </div>
            <div class="item-info">
              <div class="item-name">66号线</div>
              <div class="item-direction">52号院 → 翰林楼</div>
            </div>
          </div>
          <div class="history-item" onclick="location.href='line.html?lineName=' + encodeURIComponent('76号线')">
            <div class="item-icon">
              <svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="5919">
                <path
                  d="M835.5 165.9c-5.9-13.3-13.9-24.9-23.9-35-10-10-21.7-18-34.9-23.9-13.3-5.9-27.6-8.8-42.9-8.8H291.6c-15.3 0-29.6 3-42.9 8.8-13.3 5.9-24.9 13.9-34.9 23.9-10 10-18 21.7-23.9 35-5.9 13.3-8.8 27.6-8.8 42.9V707c0 15.3 0.1 29.6 0.4 42.9 0.3 13.3 1.9 24.9 4.9 34.9 2.9 10 8.3 18 15.9 23.9 7.7 5.9 18.9 8.8 33.6 8.8v54.9c0 15.3 5.5 28.5 16.4 39.4 10.9 10.9 24 16.4 39.4 16.4 15.3 0 28.3-5.5 38.9-16.4 10.6-10.9 15.9-24 15.9-39.4v-54.9H679v54.9c0 15.3 5.3 28.5 15.9 39.4 10.6 10.9 23.6 16.4 38.9 16.4 15.3 0 28.5-5.5 39.4-16.4 10.9-10.9 16.4-24 16.4-39.4v-54.9c15.3 0 26.8-2.9 34.5-8.8 7.7-5.9 13-13.9 15.9-23.9 2.9-10 4.4-21.8 4.4-35.4V208.8c0-15.3-3-29.6-8.9-42.9zM380.9 161c5.3-5.3 11.8-8 19.5-8H625c7.7 0 14.2 2.6 19.5 8 5.3 5.3 8 11.8 8 19.5 0 8.3-2.6 15-8 20.4-5.3 5.3-11.8 8-19.5 8H400.4c-7.7 0-14.2-2.7-19.5-8-5.3-5.3-8-12.1-8-20.4 0.1-7.7 2.7-14.1 8-19.5z m-34.9 542.9c-8 8-17.5 11.9-28.7 11.9-11.8 0-21.5-4-29.2-11.9-7.7-8-11.5-17.6-11.5-28.8s3.8-20.8 11.5-28.8 17.4-11.9 29.2-11.9c11.2 0 20.8 4 28.7 11.9 8 8 11.9 17.5 11.9 28.8s-4 20.8-11.9 28.8z m385.6-1.3c-7.4 7.7-16.4 11.5-27 11.5-11.2 0-20.5-3.8-27.9-11.5-7.4-7.7-11.1-16.8-11.1-27.4 0-10.6 3.7-19.8 11.1-27.4 7.4-7.7 16.7-11.5 27.9-11.5 10.6 0 19.6 3.8 27 11.5 7.4 7.7 11.1 16.8 11.1 27.4 0 10.6-3.7 19.7-11.1 27.4z m57.9-217.7H235.9V263.7h553.7v221.2z"
                  p-id="5920" />
              </svg>
            </div>
            <div class="item-info">
              <div class="item-name">76号线</div>
              <div class="item-direction">北区 → 南区</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" style="margin-top: -4px; margin-bottom: 8px;">站点</div>
        <div class="history-list">
          <div class="history-item" onclick="location.href='station.html?stationName=' + encodeURIComponent('52号院南门')">
            <div class="item-icon station-icon">
              <svg viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
            </div>
            <div class="item-info">
              <div class="item-name">52号院南门</div>
            </div>
          </div>
          <div class="history-item" onclick="location.href='station.html?stationName=' + encodeURIComponent('翰林楼')">
            <div class="item-icon station-icon">
              <svg viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
            </div>
            <div class="item-info">
              <div class="item-name">翰林楼</div>
            </div>
          </div>
          <div class="history-item" onclick="location.href='station.html?stationName=' + encodeURIComponent('南北大道')">
            <div class="item-icon station-icon">
              <svg viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
            </div>
            <div class="item-info">
              <div class="item-name">南北大道</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 返回按钮
      document.querySelector('.back-btn').addEventListener('click', function () {
        history.back();
      });

      // 搜索数据
      const searchData = {
        routes: [
          { name: '66号线', direction: '52号院 → 翰林楼', time: '首班 07:30 · 末班 18:00' },
          { name: '76号线', direction: '北区 → 南区', time: '首班 07:00 · 末班 19:00' },
          { name: '88号线', direction: '东门 → 西院', time: '首班 06:30 · 末班 20:00' },
          { name: '33号线', direction: '南北大道 → 综合楼', time: '首班 07:15 · 末班 18:30' },
          { name: '55号线', direction: '南区 → 北区', time: '首班 06:45 · 末班 19:30' }
        ],
        stations: [
          { name: '52号院南门' },
          { name: '翰林楼' },
          { name: '南北大道' },
          { name: '综合楼' },
          { name: '108教学楼' }
        ]
      };

      const searchInput = document.querySelector('.search-input-field');
      const clearBtn = document.querySelector('.clear-btn');
      const searchResults = document.getElementById('searchResults');
      const historyContent = document.getElementById('historyContent');

      const routeIconSVG = `<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="5919"><path d="M835.5 165.9c-5.9-13.3-13.9-24.9-23.9-35-10-10-21.7-18-34.9-23.9-13.3-5.9-27.6-8.8-42.9-8.8H291.6c-15.3 0-29.6 3-42.9 8.8-13.3 5.9-24.9 13.9-34.9 23.9-10 10-18 21.7-23.9 35-5.9 13.3-8.8 27.6-8.8 42.9V707c0 15.3 0.1 29.6 0.4 42.9 0.3 13.3 1.9 24.9 4.9 34.9 2.9 10 8.3 18 15.9 23.9 7.7 5.9 18.9 8.8 33.6 8.8v54.9c0 15.3 5.5 28.5 16.4 39.4 10.9 10.9 24 16.4 39.4 16.4 15.3 0 28.3-5.5 38.9-16.4 10.6-10.9 15.9-24 15.9-39.4v-54.9H679v54.9c0 15.3 5.3 28.5 15.9 39.4 10.6 10.9 23.6 16.4 38.9 16.4 15.3 0 28.5-5.5 39.4-16.4 10.9-10.9 16.4-24 16.4-39.4v-54.9c15.3 0 26.8-2.9 34.5-8.8 7.7-5.9 13-13.9 15.9-23.9 2.9-10 4.4-21.8 4.4-35.4V208.8c0-15.3-3-29.6-8.9-42.9zM380.9 161c5.3-5.3 11.8-8 19.5-8H625c7.7 0 14.2 2.6 19.5 8 5.3 5.3 8 11.8 8 19.5 0 8.3-2.6 15-8 20.4-5.3 5.3-11.8 8-19.5 8H400.4c-7.7 0-14.2-2.7-19.5-8-5.3-5.3-8-12.1-8-20.4 0.1-7.7 2.7-14.1 8-19.5z m-34.9 542.9c-8 8-17.5 11.9-28.7 11.9-11.8 0-21.5-4-29.2-11.9-7.7-8-11.5-17.6-11.5-28.8s3.8-20.8 11.5-28.8 17.4-11.9 29.2-11.9c11.2 0 20.8 4 28.7 11.9 8 8 11.9 17.5 11.9 28.8s-4 20.8-11.9 28.8z m385.6-1.3c-7.4 7.7-16.4 11.5-27 11.5-11.2 0-20.5-3.8-27.9-11.5-7.4-7.7-11.1-16.8-11.1-27.4 0-10.6 3.7-19.8 11.1-27.4 7.4-7.7 16.7-11.5 27.9-11.5 10.6 0 19.6 3.8 27 11.5 7.4 7.7 11.1 16.8 11.1 27.4 0 10.6-3.7 19.7-11.1 27.4z m57.9-217.7H235.9V263.7h553.7v221.2z" p-id="5920"/></svg>`;

      const stationIconSVG = `<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

      function performSearch() {
        const query = searchInput.value.trim();

        // 如果输入框为空，显示历史记录，隐藏搜索结果
        if (!query) {
          searchResults.classList.remove('show');
          historyContent.style.display = 'block';
          return;
        }

        // 搜索路线
        const matchedRoutes = searchData.routes.filter(route =>
          route.name.includes(query)
        );

        // 搜索站点
        const matchedStations = searchData.stations.filter(station =>
          station.name.includes(query)
        );

        // 显示搜索结果，隐藏历史
        searchResults.classList.add('show');
        historyContent.style.display = 'none';

        let html = '';

        // 路线结果
        if (matchedRoutes.length > 0) {
          html += '<div class="section-title">路线</div>';
          html += matchedRoutes.map(route => `
          <div class="result-card" onclick="location.href='line.html?lineName=' + encodeURIComponent('${route.name}')">
            <div class="result-header">
              <div class="result-icon">
                ${routeIconSVG}
              </div>
              <div class="result-info">
                <div class="result-name">${route.name}</div>
                <div class="result-direction">${route.direction}</div>
              </div>
            </div>
          </div>
        `).join('');
        }

        // 站点结果
        if (matchedStations.length > 0) {
          html += '<div class="section-title" style="margin-top: 16px;">站点</div>';
          html += matchedStations.map(station => `
          <div class="result-card" onclick="location.href='station.html?stationName=' + encodeURIComponent('${station.name}')">
            <div class="result-header">
              <div class="result-icon station-icon">
                ${stationIconSVG}
              </div>
              <div class="result-info">
                <div class="result-name">${station.name}</div>
              </div>
            </div>
          </div>
        `).join('');
        }

        if (matchedRoutes.length === 0 && matchedStations.length === 0) {
          html = '<div class="no-results">未找到相关路线或站点</div>';
        }

        document.getElementById('resultsList').innerHTML = html;
      }

      // 输入事件
      searchInput.addEventListener('input', function () {
        clearBtn.style.display = this.value.trim() ? 'block' : 'none';
        performSearch();
      });

      // 清除按钮
      clearBtn.addEventListener('click', function () {
        searchInput.value = '';
        this.style.display = 'none';
        performSearch();
      });
    </script>
  </div>
</body>

</html>
